name: i18n-check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  i18n-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: i18n Check
        run: bun run i18n:check
