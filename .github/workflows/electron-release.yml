name: Electron Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: macOS (arm64+x64)
    runs-on: macos-14

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build App
        run: bun run electron:build

      - name: Derive Version From Tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish To GitHub Releases
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --config electron-builder.yml --project apps/electron --mac --arm64 --x64 --publish always -c.extraMetadata.version="${APP_VERSION}"
          else
            npx electron-builder --config electron-builder.yml --project apps/electron --mac --arm64 --x64 --publish always
          fi
