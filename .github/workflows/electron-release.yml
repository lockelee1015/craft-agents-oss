name: Electron Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: macOS (arm64+x64)
    runs-on: macos-14

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.CSC_NAME }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build App
        run: bun run electron:build

      - name: Prepare Claude Agent SDK For Packaging
        run: |
          mkdir -p apps/electron/node_modules/@anthropic-ai
          rm -rf apps/electron/node_modules/@anthropic-ai/claude-agent-sdk
          cp -R node_modules/@anthropic-ai/claude-agent-sdk apps/electron/node_modules/@anthropic-ai/

      - name: Derive Version From Tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare Apple API Key File
        run: |
          if [[ -n "${APPLE_API_KEY_P8:-}" && -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "${APPLE_API_KEY_P8}" > "$KEY_PATH"
            echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          else
            echo "Apple notarization API key not fully configured; continuing without APPLE_API_KEY."
          fi

      - name: Normalize CSC_NAME
        run: |
          CLEAN_NAME="${CSC_NAME#Developer ID Application: }"
          echo "CSC_NAME=$CLEAN_NAME" >> "$GITHUB_ENV"

      - name: Prepare Bun Runtime (arm64)
        run: |
          set -euo pipefail
          BUN_VERSION="bun-v1.3.5"
          BUN_DOWNLOAD="bun-darwin-aarch64"
          TEMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TEMP_DIR"' EXIT

          mkdir -p apps/electron/vendor/bun
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/${BUN_DOWNLOAD}.zip" -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip"
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/SHASUMS256.txt" -o "$TEMP_DIR/SHASUMS256.txt"

          (
            cd "$TEMP_DIR"
            grep "${BUN_DOWNLOAD}.zip" SHASUMS256.txt | shasum -a 256 -c -
          )

          unzip -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip" -d "$TEMP_DIR"
          cp "$TEMP_DIR/${BUN_DOWNLOAD}/bun" apps/electron/vendor/bun/bun
          chmod +x apps/electron/vendor/bun/bun

      - name: Publish Arm64 To GitHub Releases
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --config electron-builder.yml --project apps/electron --mac --arm64 --publish always -c.extraMetadata.version="${APP_VERSION}"
          else
            npx electron-builder --config electron-builder.yml --project apps/electron --mac --arm64 --publish always
          fi

      - name: Prepare Bun Runtime (x64)
        run: |
          set -euo pipefail
          BUN_VERSION="bun-v1.3.5"
          BUN_DOWNLOAD="bun-darwin-x64"
          TEMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TEMP_DIR"' EXIT

          mkdir -p apps/electron/vendor/bun
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/${BUN_DOWNLOAD}.zip" -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip"
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/SHASUMS256.txt" -o "$TEMP_DIR/SHASUMS256.txt"

          (
            cd "$TEMP_DIR"
            grep "${BUN_DOWNLOAD}.zip" SHASUMS256.txt | shasum -a 256 -c -
          )

          unzip -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip" -d "$TEMP_DIR"
          cp "$TEMP_DIR/${BUN_DOWNLOAD}/bun" apps/electron/vendor/bun/bun
          chmod +x apps/electron/vendor/bun/bun

      - name: Publish X64 To GitHub Releases
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --config electron-builder.yml --project apps/electron --mac --x64 --publish always -c.extraMetadata.version="${APP_VERSION}"
          else
            npx electron-builder --config electron-builder.yml --project apps/electron --mac --x64 --publish always
          fi
